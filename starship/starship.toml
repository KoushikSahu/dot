# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# format = """
# [\u256D\u2574](fg:greydimmed)\
# $os\
# $shell\
# $username\
# $hostname\
# $sudo\
# $directory\
# $direnv\
# $git_branch$git_commit$git_state$git_metrics$git_status\
# [ ](fg:greydarker)\
# $fill\
# $fill\
# $status\
# $jobs\
# $memory_usage\
# $cmd_duration\
# $battery\
# $time\
# $line_break\
# \
# [\u2570\u2574](fg:greydimmed)\
# [$character]($style)"""

format = """
$python\
$os\
$sudo\
$shell\
$username\
$hostname\
$directory\
$direnv\
$git_branch$git_commit$git_state$git_metrics$git_status\
$status\
$jobs\
$memory_usage\
$cmd_duration\
$battery\
$time\
[ $character]($style)"""

# move the rest of the prompt to the right
right_format = """
[$localip]($style)"""

# Inserts a blank line between shell prompts:
add_newline = false

# Color Palette
palette = "Power10"

[palettes.Power10]
# only lowercase names
greydimmed = '#424242'
greydarker = '#242424'
ossymbol = '#AAAAAA' # dimmed white
user = 'green'
userroot = 'red'
sshsymbol = 'green'
hostname = 'green'
sudo = 'red'
directory = 'cyan'
php = '#7a86b8' # light blue
python = 'yellow'
# git start ---
orangegit = '#E04D27'
conflicted = 'red'
ahead = 'yellow'
behind = 'yellow'
diverged = 'yellow'
uptodate = 'green'
untracked = 'red'
stashed = '#A52A2A' # redbrown
modified = '#C8AC00' # darker yellow
staged = 'green'
renamed = 'yellow'
deleted = 'orange'
# git end ---
jobs = 'blue'
memory = 'purple'
duration = 'yellow'
fill = '#424242' # greydimmed
status = 'red'
localip = 'green'
shell = '#424242' # greydimmed

# Customization and activation of some modules:
# Listed in the order of their position in the module rows above
